name: Testes do internet banking

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install schemathesis
      - run: python app.py &
      - run: sleep 3
      - run: pytest features/ -v --junit-xml=report.xml
      - run: schemathesis run openapi.yaml --base-url=http://127.0.0.1:5000 --checks all --hypothesis-max-examples=50
      - run: python gera_matriz.py > matriz_rastreabilidade.md
      - uses: actions/upload-artifact@v4
        with:
          name: evidencia
          path: "report.xml matriz_rastreabilidade.md"
